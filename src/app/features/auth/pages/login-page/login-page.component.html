<article class="surface-card login-page">
  <div class="section-copy">
    <span class="pill-chip">Empleado</span>
    <h1>Acceso a Nexo</h1>
    <p>
      Inicia sesion con tu cuenta de colaborador para consultar asistencias, vacaciones y tu
      informacion personal.
    </p>
  </div>

  <form class="login-page__form" [formGroup]="loginForm" (ngSubmit)="submit()">
    <p *ngIf="infoMessage" class="login-page__info">{{ infoMessage }}</p>

    <div class="login-page__fields">
      <label>
        <span>Correo electronico</span>
        <input type="email" formControlName="email" placeholder="empleado@empresa.com" />
        <small *ngIf="shouldShowFieldError('email')">Ingresa un correo electronico valido.</small>
      </label>

      <label>
        <span>Contrasena</span>
        <input type="password" formControlName="password" placeholder="********" />
        <small *ngIf="shouldShowFieldError('password')">La contrasena es obligatoria.</small>
      </label>

      <label *ngIf="requiresCompanySelection()">
        <span>Empresa</span>
        <select formControlName="companyIdHint">
          <option value="">Selecciona una empresa</option>
          <option *ngFor="let company of companyOptions()" [value]="company.companyId">
            {{ company.tradeName || company.name }}
          </option>
        </select>
        <small>Selecciona la empresa correcta para completar el acceso.</small>
      </label>
    </div>

    <p *ngIf="errorMessage()" class="login-page__error">{{ errorMessage() }}</p>

    <button
      class="action-button action-button--primary"
      type="submit"
      [disabled]="loginForm.invalid || isSubmitting()"
    >
      {{ isSubmitting() ? 'Iniciando...' : 'Iniciar sesion' }}
    </button>
  </form>
</article>
